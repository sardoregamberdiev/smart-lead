spring:
  application:
    name: smartlead
  datasource:
    url: jdbc:h2:mem:smartlead;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.esardor: DEBUG
    org.flywaydb: DEBUG

# HuggingFace (token goes in separate secrets file)
ai:
  huggingface:
    token: ${HF_TOKEN}
    base-url: https://router.huggingface.co
    model: meta-llama/Llama-3.3-70B-Instruct:groq