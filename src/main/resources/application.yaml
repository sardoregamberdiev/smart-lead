spring:
  application:
    name: smartlead

  datasource:
    url: jdbc:h2:mem:smartleaddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=value
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.esardor: DEBUG
    org.flywaydb: INFO

ai:
  huggingface:
    token: ${HF_TOKEN}
    base-url: https://router.huggingface.co
    model: meta-llama/Llama-3.3-70B-Instruct:groq